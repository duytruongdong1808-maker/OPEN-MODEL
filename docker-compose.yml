services:
  # read_only services keep explicit writable paths only:
  # backend writes SQLite/token state under open-model-outputs:/app/outputs;
  # web writes runtime cache to tmpfs at /app/.next/cache and /tmp;
  # redis persists append-only data under redis-data:/data.
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      OPEN_MODEL_DB_PATH: /app/outputs/app/chat.sqlite3
      OPEN_MODEL_LEDGER_DB_PATH: /app/outputs/app/ledger.sqlite3
      GOOGLE_OAUTH_TOKEN_PATH: /app/outputs/app/gmail_token.json
      GOOGLE_OAUTH_STATE_PATH: /app/outputs/app/gmail_oauth_state.json
      OPEN_MODEL_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - open-model-outputs:/app/outputs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          # TODO: profile model loading and adjust this limit.
          memory: 4g

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
      - /app/.next/cache:rw,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      OPEN_MODEL_API_BASE_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  open-model-outputs:
  redis-data:
