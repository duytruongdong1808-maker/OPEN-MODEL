services:
  # read_only services keep explicit writable paths only:
  # backend writes SQLite/token state under open-model-outputs:/app/outputs;
  # web writes runtime cache to tmpfs at /app/.next/cache and /tmp;
  # redis persists append-only data under redis-data:/data.
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256m

  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: openmodel
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: openmodel
    read_only: false
    tmpfs:
      - /tmp
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    volumes:
      - postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmodel"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # GPU passthrough requires nvidia-container-toolkit on the host. For CPU-only
  # development, use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
  inference:
    image: vllm/vllm-openai:v0.6.3
    command: >
      --model Qwen/Qwen2.5-3B-Instruct-AWQ
      --quantization awq
      --enable-lora
      --lora-modules adapter=/adapters/final_adapter
      --max-loras 1
      --max-lora-rank 16
      --max-model-len 1536
      --gpu-memory-utilization 0.85
      --chat-template /chat_templates/qwen_chat_template.jinja
      --port 8001
    volumes:
      - ./outputs/qwen2.5_3b_lora_v5/final_adapter:/adapters/final_adapter:ro
      - ./configs/qwen_chat_template.jinja:/chat_templates/qwen_chat_template.jinja:ro
      - hf-cache:/root/.cache/huggingface
    read_only: false
    tmpfs:
      - /tmp:rw,size=512m
    security_opt:
      - "no-new-privileges:true"
    userns_mode: "private"
    cap_drop:
      - ALL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 10g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      OPEN_MODEL_DATABASE_URL: postgresql+psycopg://openmodel@postgres:5432/openmodel
      OPEN_MODEL_LEDGER_DATABASE_URL: postgresql+psycopg://openmodel@postgres:5432/openmodel
      OPEN_MODEL_DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      OPEN_MODEL_DB_PATH: /app/outputs/app/chat.sqlite3
      OPEN_MODEL_LEDGER_DB_PATH: /app/outputs/app/ledger.sqlite3
      GOOGLE_OAUTH_TOKEN_PATH: /app/outputs/app/gmail_token.json
      GOOGLE_OAUTH_STATE_PATH: /app/outputs/app/gmail_oauth_state.json
      OPEN_MODEL_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OPEN_MODEL_INFERENCE_BACKEND: vllm
      OPEN_MODEL_VLLM_URL: http://inference:8001/v1
      OPEN_MODEL_VLLM_MODEL: adapter
    volumes:
      - open-model-outputs:/app/outputs
    secrets:
      - postgres_password
    expose:
      - "8000"
    depends_on:
      inference:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          # TODO: profile model loading and adjust this limit.
          memory: 4g

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
      - /app/.next/cache:rw,size=64m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      OPEN_MODEL_API_BASE_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  hf-cache:
  open-model-outputs:
  postgres-data:
  redis-data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
