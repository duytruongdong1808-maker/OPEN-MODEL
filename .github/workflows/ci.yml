name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest with coverage
        run: pytest -q --cov=src --cov-report=term --cov-report=xml --cov-fail-under=70

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit --strict --requirement requirements.txt

  backend-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.18.0
          GITLEAKS_CONFIG: .gitleaks.toml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t open-model-backend:ci -f Dockerfile .

      - name: Build web image
        run: docker build -t open-model-web:ci -f web/Dockerfile ./web

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: open-model-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy web image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: open-model-web:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  integration-smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker-build
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create integration environment
        run: |
          cat > .env <<'EOF'
          AGENT_OPS_TOKEN=ci-agent-ops-token
          AUTH_SECRET=ci-auth-secret-at-least-32-bytes-long
          INTERNAL_HMAC_SECRET=ci-internal-hmac-secret-at-least-32-bytes
          AUTH_USERNAME=admin
          AUTH_PASSWORD=ci-password
          OPEN_MODEL_SKIP_MODEL_LOAD=true
          EOF

      - name: Start compose stack
        run: docker compose up -d backend web

      - name: Wait for web
        run: |
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:3000 >/dev/null; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for web."
              exit 1
            fi
            sleep 3
          done

      - name: Check live endpoint through proxy
        run: |
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:3000/api/backend/health/live; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for backend live endpoint through web proxy."
              docker compose ps
              exit 1
            fi
            sleep 3
          done

      - name: Check unauthenticated conversations are denied
        run: |
          status=$(curl -sS -o /tmp/conversations.json -w "%{http_code}" http://localhost:3000/api/backend/conversations)
          if [ "$status" != "401" ]; then
            cat /tmp/conversations.json
            echo "Expected 401, got $status"
            exit 1
          fi

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs backend web > compose-logs.txt

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-compose-logs
          path: compose-logs.txt
          if-no-files-found: ignore

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
