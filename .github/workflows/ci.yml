name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
        ports:
          - "5432:5432"
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest with coverage
        run: pytest -q --cov=src --cov-report=term --cov-report=xml --cov-fail-under=70
        env:
          OPEN_MODEL_SKIP_MODEL_LOAD: "true"

      - name: Validate Postgres migrations
        run: alembic upgrade head
        env:
          OPEN_MODEL_DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci

      - name: Run Postgres tests
        run: pytest -q -m postgres
        env:
          OPEN_MODEL_DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit --strict --requirement requirements.txt

  backend-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.18.0
          GITLEAKS_CONFIG: .gitleaks.toml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s --health-timeout 5s --health-retries 10
        ports:
          - "5432:5432"
      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
        ports:
          - "6379:6379"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements-dev.txt

      - run: npm ci
        working-directory: web

      - run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Install Firefox for nightly matrix
        if: github.event_name == 'schedule'
        run: npx playwright install --with-deps firefox
        working-directory: web

      - name: Apply DB migrations
        env:
          OPEN_MODEL_DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
        run: alembic upgrade head

      - name: Start backend
        env:
          OPEN_MODEL_SKIP_MODEL_LOAD: "true"
          OPEN_MODEL_DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
          AGENT_OPS_TOKEN: ci-agent-ops-token
          INTERNAL_HMAC_SECRET: ci-internal-hmac-secret-32bytes-padding
        run: |
          uvicorn src.server.app:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/health/live && exit 0 || sleep 2
          done
          echo "Backend failed to start"; exit 1

      - name: Build web
        working-directory: web
        env:
          AUTH_USERNAME: ci
          AUTH_PASSWORD: ci-password
          AUTH_SECRET: ci-auth-secret-32bytes-padding-here
          INTERNAL_HMAC_SECRET: ci-internal-hmac-secret-32bytes-padding
          AGENT_OPS_TOKEN: ci-agent-ops-token
          REDIS_URL: redis://localhost:6379
          OPEN_MODEL_API_BASE_URL: http://localhost:8000
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

      - name: Start web
        working-directory: web
        env:
          AUTH_USERNAME: ci
          AUTH_PASSWORD: ci-password
          AUTH_SECRET: ci-auth-secret-32bytes-padding-here
          INTERNAL_HMAC_SECRET: ci-internal-hmac-secret-32bytes-padding
          AGENT_OPS_TOKEN: ci-agent-ops-token
          REDIS_URL: redis://localhost:6379
          OPEN_MODEL_API_BASE_URL: http://localhost:8000
          NEXTAUTH_URL: http://localhost:3000
        run: |
          npm run start &
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000 && exit 0 || sleep 2
          done
          echo "Web failed to start"; exit 1

      - name: Run Playwright
        working-directory: web
        env:
          E2E_USERNAME: ci
          E2E_PASSWORD: ci-password
          E2E_BASE_URL: http://localhost:3000
          E2E_FULL_MATRIX: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: web/test-results
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t open-model-backend:ci -f Dockerfile .

      - name: Build web image
        run: docker build -t open-model-web:ci -f web/Dockerfile ./web

      - name: Verify image hardening
        run: bash scripts/verify_images.sh
        env:
          BACKEND_IMAGE: open-model-backend:ci
          WEB_IMAGE: open-model-web:ci

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: open-model-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy web image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: open-model-web:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  integration-smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker-build
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create integration environment
        run: |
          mkdir -p secrets
          printf '%s\n' 'ci-postgres-password' > secrets/postgres_password
          cat > .env <<'EOF'
          AGENT_OPS_TOKEN=ci-agent-ops-token
          AUTH_SECRET=ci-auth-secret-at-least-32-bytes-long
          INTERNAL_HMAC_SECRET=ci-internal-hmac-secret-at-least-32-bytes
          AUTH_USERNAME=admin
          AUTH_PASSWORD=ci-password
          OPEN_MODEL_SKIP_MODEL_LOAD=true
          EOF

      - name: Start compose stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d backend web

      - name: Wait for web
        run: |
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:3000 >/dev/null; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for web."
              exit 1
            fi
            sleep 3
          done

      - name: Check live endpoint through proxy
        run: |
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:3000/api/backend/health/live; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for backend live endpoint through web proxy."
              docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
              exit 1
            fi
            sleep 3
          done

      - name: Check metrics endpoint through proxy
        run: |
          curl -fsS http://localhost:3000/api/backend/metrics | head -50 | grep agent_run_duration_seconds

      - name: Check unauthenticated conversations are denied
        run: |
          status=$(curl -sS -o /tmp/conversations.json -w "%{http_code}" http://localhost:3000/api/backend/conversations)
          if [ "$status" != "401" ]; then
            cat /tmp/conversations.json
            echo "Expected 401, got $status"
            exit 1
          fi

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml logs backend web > compose-logs.txt

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-compose-logs
          path: compose-logs.txt
          if-no-files-found: ignore

      - name: Stop compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v

      # Optional GPU smoke on a self-hosted NVIDIA runner:
      # - run: bash scripts/smoke_vllm.sh
      #   env:
      #     OPEN_MODEL_INFERENCE_BACKEND: vllm
