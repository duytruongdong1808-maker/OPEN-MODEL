# CPU-only/local development override.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  inference:
    image: python:3.11-alpine
    command: !override
      - python
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, HTTPServer

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b'{"status":"stub"}')

            def log_message(self, format, *args):
                pass

        HTTPServer(("0.0.0.0", 8001), Handler).serve_forever()
    read_only: true
    volumes: !reset []
    tmpfs: !override
      - /tmp:rw,size=16m
    security_opt: !override
      - "no-new-privileges:true"
    cap_drop: !override
      - ALL
    deploy: !override
      resources:
        reservations:
          devices: []
        limits:
          memory: 64m
    healthcheck: !override
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    environment:
      OPEN_MODEL_INFERENCE_BACKEND: local
